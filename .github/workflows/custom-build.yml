name: Build Custom Server
on:
  workflow_dispatch:

  push:
    branches:
      - master
jobs:
  workflow_dispatch:

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Worldserver
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/docker/Dockerfile
  workflow_dispatch:

          push: true
          tags: ghcr.io/${{ github.repository }}-worldserver:master
          target: worldserver
      - name: Build and push Authserver
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/docker/Dockerfile
  workflow_dispatch:

          push: true
          tags: ghcr.io/${{ github.repository }}-authserver:master
          target: authserver
      - name: Build and push Client-Data
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/docker/Dockerfile
  workflow_dispatch:

          push: true
          tags: ghcr.io/${{ github.repository }}-client-data:master
          target: client-data
      - name: Build and push DB-Import
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/docker/Dockerfile
  workflow_dispatch:

          push: true
          tags: ghcr.io/${{ github.repository }}-db-import:master
          target: db-import
